<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Erebus Group — Cost Counter | Culpeper County, VA</title>

<style>
body {
  background:#0a0a0a;
  color:#e8e0d0;
  font-family: monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container {
  text-align:center;
}

.counter {
  font-size:48px;
  color:#cc0000;
}
</style>
</head>

<body>

<div class="container">
  <h2>Estimated Total Paid</h2>
  <div id="counter" class="counter">$0.00</div>
</div>

<script>
const BASE_AMOUNT = 416340.22;
const RATE_PER_SECOND = 17441.67 / (14 * 24 * 60 * 60);
const BASE_DATE = new Date('2026-03-15T00:00:00Z');

function formatMoney(amount) {
  return '$' + amount.toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function update() {
  const now = new Date();
  const secondsElapsed = (now - BASE_DATE) / 1000;
  const total = BASE_AMOUNT + (secondsElapsed * RATE_PER_SECOND);
  document.getElementById('counter').textContent = formatMoney(total);
  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
